name: app_patient
description: >-
  HealthTech patient app (Flutter). Mobile-first, offline-first, entry-level
  Android target. All cryptography is delegated to the shared Rust crypto-core
  via flutter_rust_bridge (no Dart cipher). See docs/adr/0001 and docs/adr/0006.
publish_to: "none"
version: 0.1.0+1

# Era-correct for late-2025 / 2026. Dart 3.x null-safe.
environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Dart<->Rust FFI to crypto-core. ADR 0001/0003: the ONLY crypto path.
  # Pinned (tilde) — FRB version must match the codegen used in crypto-core. TODO(#11).
  flutter_rust_bridge: ^2.7.0

  # Offline encrypted store. SQLCipher full-DB AES-256 (ADR 0006). DB key is
  # unsealed from the Keystore-wrapped blob, in-memory only. TODO(#14).
  # NB: only sqlcipher_flutter_libs — it bundles SQLCipher AND the same
  # Sqlite3FlutterLibsPlugin as sqlite3_flutter_libs, so depending on both
  # breaks the Android build (duplicate class at dex merge). drift uses the
  # SQLCipher native lib it ships.
  drift: ^2.21.0
  sqlcipher_flutter_libs: ^0.6.4
  # Direct sqlite3 use: PRAGMA-key setup hook + the SQLCipher open() override
  # (sqlcipher_flutter_libs ships the native lib; sqlite3 is the Dart binding).
  sqlite3: ^2.4.0

  # QR: scan (mobile_scanner, one package Android+iOS) + generate (qr_flutter).
  # 120 s TTL lives in app logic. TODO(#16).
  mobile_scanner: ^5.2.3
  qr_flutter: ^4.1.0

  # Non-critical secrets only (NOT the master key — that is StrongBox/TEE via the
  # Kotlin platform-channel shim). ADR 0001. TODO(#11).
  flutter_secure_storage: ^10.3.1

  # HTTP client for cloud backup transport (issue #14).
  # Used by BackendClient (PUT/GET /blob/{uuid}); injectable in tests via MockClient.
  http: ^1.2.0

  # SHA-256 for the media content-integrity HASH only (issue #23) — NOT a cipher.
  # AES stays in crypto-core (ADR 0001/0003); this computes the descriptor's
  # end-to-end content_hash, an integrity check on top of the GCM tag.
  crypto: ^3.0.0

  path_provider: ^2.1.4
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
