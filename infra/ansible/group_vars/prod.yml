---
# Ansible group_vars — PROD (ADR 0007, #4). Env-scoped, SECRET-FREE.
# Auto-loaded for hosts in the `prod` inventory group. NO secret values here —
# secrets are decrypted from secrets/prod/services.sops.yaml at run time.
env: prod
country: CI # residency pin (ARTCI / loi 2013-450); never override

backend_instance_count: 2
postgres_replica_count: 1

# Where the decrypted operational secrets are written at run time (0600, root-only).
secrets_env_file: /run/healthtech/prod.env
# SOPS source bundle for this environment (encrypted at rest; decrypted in-country).
sops_secrets_path: ../../secrets/prod/services.sops.yaml
