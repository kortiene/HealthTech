# HealthTech — LOCAL DEV stack (ADR 0007, #4): Postgres + MinIO.
#
# This stands up a staging-SHAPED footprint on a contributor laptop with THROWAWAY,
# NON-sensitive credentials so nobody ever needs a real credential to develop. It is
# NOT residency-bound (synthetic data only). Real staging/prod run in-country via
# Terraform + Ansible with SOPS-injected secrets — see infra/README.md.
#
# Bring up with:  just dev-up      (reads repo-root .env, copied from .env.example)
# Tear down with: just dev-down
#
# The credentials below are obvious dev throwaways and are overridden by .env values.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-healthtech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_throwaway_pg}
      POSTGRES_DB: ${POSTGRES_DB:-healthtech}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-healthtech}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-dev_minio_root}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev_throwaway_minio}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
