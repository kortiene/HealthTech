name: secrets

# Secret-scan gate for issue #4 (ADR 0007). Fails closed if a plaintext secret
# is introduced. This issue PROVIDES the gate; #3 owns the app/backend CI matrix
# and may fold this step in there later.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: gitleaks + secret hygiene + residency tripwire
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks (full history)
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml

      - name: Secret hygiene tripwire
        run: bash scripts/check-secrets.sh

      # Data-residency anti-regression gate (issue #8, ADR 0005 / loi 2013-450 /
      # ARTCI). Fails closed if a foreign cloud provider / state backend /
      # endpoint, or a non-CI `country` override, enters infra/. Credential-free
      # and network-free, like the secret-hygiene tripwire above.
      - name: Data-residency tripwire
        run: bash scripts/check-residency.sh
